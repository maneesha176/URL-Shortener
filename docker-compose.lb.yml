# Additive deployment that puts nginx load balancing in front of N scalable
# api-server replicas, backed by MySQL and a Redis cache.
#
#   ./gradlew clean build -x test
#   docker-compose -f docker-compose.lb.yml up --build --scale api-server=3
#
# nginx is published on http://localhost:8080 and fans requests out across the
# api-server replicas. The original docker-compose.yml is left untouched.
version: "3"

services:
  # Reverse proxy / load balancer. This is the only entry point exposed to the host.
  nginx:
    image: nginx:1.25-alpine
    container_name: urlshortener-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:8080"
    depends_on:
      - api-server
    networks:
      - urlshortener-network

  # Application. No container_name / no host port mapping so it can be scaled:
  #   --scale api-server=3
  api-server:
    build:
      context: .
      dockerfile: api.lb.Dockerfile
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysqlurldb:3306/urldb?autoReconnect=true&failOverReadOnly=false&maxReconnects=10&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=pa55w0rd
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
    depends_on:
      - api-db
      - redis
    networks:
      - urlshortener-network

  # Shared cache used by UrlCacheAspect.
  redis:
    image: redis:7-alpine
    container_name: urlshortener-redis
    ports:
      - "6379:6379"
    networks:
      - urlshortener-network

  # Shared database. Hostname mysqlurldb matches SPRING_DATASOURCE_URL above.
  api-db:
    container_name: mysqlurldb
    build:
      context: .
      dockerfile: db.Dockerfile
    environment:
      - MYSQL_ROOT_PASSWORD=pa55w0rd
      - MYSQL_DATABASE=urldb
    networks:
      - urlshortener-network

networks:
  urlshortener-network:
