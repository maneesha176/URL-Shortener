worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Docker's embedded DNS server. Re-resolving the api-server service name on a
    # short TTL lets nginx round-robin across every scaled replica
    # (docker-compose ... up --scale api-server=N).
    resolver 127.0.0.11 valid=5s ipv6=off;

    log_format upstream_log '$remote_addr -> $upstream_addr [$status] $request';
    access_log /var/log/nginx/access.log upstream_log;

    server {
        listen 8080;

        location / {
            # Using a variable forces nginx to use the resolver above, so newly
            # added/removed api-server replicas are picked up without a restart.
            set $api_backend "api-server:8080";
            proxy_pass http://$api_backend;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
        }
    }
}
